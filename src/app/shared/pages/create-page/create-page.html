<div class="create wrapper">
  <div class="c-header">
    <app-header-component logoColor="dark" (click)="goToHome()"></app-header-component>
  </div>

  <section class="create-main">
    <div class="create-main-header">
      <section>
        <app-survery-status-component color="light">Draft</app-survery-status-component>

        <app-secondary-button-component
          [width]="40"
          [class.display-none]="screenWidth > 1600"
          (click)="goHome()"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 14 14"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M6.575 7.975L1.675 12.875C1.49167 13.0583 1.25833 13.15 0.975 13.15C0.691667 13.15 0.458333 13.0583 0.275 12.875C0.0916667 12.6917 0 12.4583 0 12.175C0 11.8917 0.0916667 11.6583 0.275 11.475L5.175 6.575L0.275 1.675C0.0916667 1.49167 0 1.25833 0 0.975C0 0.691667 0.0916667 0.458333 0.275 0.275C0.458333 0.0916667 0.691667 0 0.975 0C1.25833 0 1.49167 0.0916667 1.675 0.275L6.575 5.175L11.475 0.275C11.6583 0.0916667 11.8917 0 12.175 0C12.4583 0 12.6917 0.0916667 12.875 0.275C13.0583 0.458333 13.15 0.691667 13.15 0.975C13.15 1.25833 13.0583 1.49167 12.875 1.675L7.975 6.575L12.875 11.475C13.0583 11.6583 13.15 11.8917 13.15 12.175C13.15 12.4583 13.0583 12.6917 12.875 12.875C12.6917 13.0583 12.4583 13.15 12.175 13.15C11.8917 13.15 11.6583 13.0583 11.475 12.875L6.575 7.975Z"
              fill="white"
            />
          </svg>
        </app-secondary-button-component>
      </section>

      <div>
        <p>Create new survey</p>
        <app-secondary-button-component (click)="goToHome()">Cancel <img src="assets/img/close.png
          " alt=""></app-secondary-button-component>
      </div>
    </div>
    <div class="create-main-survey">
      <div class="create-main-survey-settings">
        <div>
          <p>Survey name</p>
          <div class="space">
            <app-input-field-component
              [value]="newSurvey.SurveyName"
              fieldName="SurveyName"
              (valueChanged)="onInputChange($event)"
              [maxLength]="30"
            ></app-input-field-component>
            <app-delete-button-component
              (click)="deleteValue('SurveyName')"
            ></app-delete-button-component>
          </div>

          <p>Set end date (optional)</p>
          <div class="field-row">
            <div class="input-with-delete">
              <app-input-field-component
                [value]="newSurvey.SetEndDate.toString()"
                fieldName="SetEndDate"
                (valueChanged)="onInputChange($event)"
                [type]="'date'"
              ></app-input-field-component>

              <app-delete-button-component
                (click)="deleteValue('SetEndDate')"
              ></app-delete-button-component>
            </div>

            <app-drop-down-component (categorySelected)="onCategorySelected($event)">
              Choose category
            </app-drop-down-component>
          </div>
        </div>

        <div>
          <p>Describing text (optional)</p>
          <div class="describing">
            <app-input-field-component
              [textArea]="true"
              [value]="newSurvey.DescribingText"
              [height]="115"
              [maxLength]="500"
              fieldName="DescribingText"
              (valueChanged)="onInputChange($event)"
            ></app-input-field-component>
            <app-delete-button-component
              (click)="deleteValue('DescribingText')"
            ></app-delete-button-component>
          </div>
        </div>
      </div>

      <div class="create-main-survey-answers">
        @for (item of questions; track item; let i = $index) {
          <app-create-question-component
            (checkboxChange)="onCheck($event, i)"
            (destroy)="removeSection(i)"
            (valueChanged)="onInputChange($event)"
            [questionNumber]="i + 1"
            >></app-create-question-component
          >
        }

        <div class="addNext">
          <app-primary-button-component
            icon="add"
            (click)="addQuestion()"
            [style.display]="questions.length >= 10 ? 'none' : 'block'"
          >
            Add next question
          </app-primary-button-component>
        </div>
      </div>
    </div>
    <div class="create-main-bottom">
      <app-primary-button-component icon="check" (click)="publishSurvey()"
        >Publish</app-primary-button-component
      >
    </div>
  </section>

  <div class="overlay">
    <app-overlay-component [published]="published" (close)="published = false">{{
      publishedOrError
    }}</app-overlay-component>
  </div>
</div>
